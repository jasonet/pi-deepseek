appId: com.pi-deepseek.desktop
productName: Pi-Deepseek
copyright: Copyright 2026 Yiding by HKEZ
electronVersion: 35.7.5

directories:
  output: release
  buildResources: resources

files:
  - out/**/*
  - package.json
  - "!node_modules/@earendil-works/pi-coding-agent/docs/**"
  - "!node_modules/@earendil-works/pi-coding-agent/examples/**"
  - "!node_modules/@earendil-works/pi-coding-agent/**/*.md"
  - "!node_modules/**/CHANGELOG.md"
  - "!node_modules/**/README.md"
  - "!node_modules/**/LICENSE"
  - "!node_modules/**/*.map"

extraResources:
  - from: resources/icon.png
    to: icon.png
  - from: resources/icon.ico
    to: icon.ico
  - from: resources/providers
    to: providers

asar:
  smartUnpack: false
  ordering: null

asarUnpack:
  - "**/*.node"
  - "**/*.wasm"
  - "**/node_modules/node-pty/**/*"
  - "**/node_modules/.pnpm/node-pty*/node_modules/node-pty/**/*"

artifactName: ${productName}-${version}-${os}-${arch}.${ext}
buildVersion: 2.6.3

electronLanguages:
  - en-US
  - en
  - zh-CN
  - zh-HK
  - zh-TW
  - ja

mac:
  artifactName: ${productName}-${version}-${os}-${arch}.${ext}
  bundleShortVersion: 2.6.3
  bundleVersion: 2.6.3
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.inherit.plist
  notarize: false
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  darkModeSupport: true
  extraFiles:
    - from: build/native/pi-deepseek-notification-status-helper
      to: MacOS/pi-deepseek-notification-status-helper

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  artifactName: ${productName}-${version}-win-${arch}.${ext}
  electronLanguages:
    - en-US
    - zh-CN
    - ja

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  artifactName: ${productName}-${version}-win-${arch}-setup.${ext}

portable:
  artifactName: ${productName}-${version}-win-${arch}-portable.${ext}

linux:
  category: Development
  executableName: pi-deepseek
  maintainer: Yiding by HKEZ
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: resources/icon.png
  electronLanguages:
    - en-US
    - zh-CN
    - ja

deb:
  compression: gz

toolsets:
  appimage: "1.0.2"

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

publish:
  provider: github
  owner: jasonet
  repo: pi-deepseek

afterPack: scripts/after-pack-slim.mjs
