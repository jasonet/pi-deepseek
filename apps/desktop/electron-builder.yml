appId: com.pi-deepseek.desktop
productName: Pi-Deepseek
copyright: Copyright 2026 Yiding by HKEZ
electronVersion: 34.5.8

directories:
  output: release
  buildResources: resources

files:
  - out/**/*
  - package.json

extraResources:
  - from: resources/icon.png
    to: icon.png
  - from: resources/icon.ico
    to: icon.ico

asar: true
asarUnpack:
  - "**/*.node"
  - "**/*.wasm"
  - "**/node_modules/node-pty/**/*"
  - "**/node_modules/.pnpm/node-pty*/node_modules/node-pty/**/*"

artifactName: ${productName}-${version}-${os}-${arch}.${ext}

mac:
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.inherit.plist
  notarize: false
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  darkModeSupport: true
  extraFiles:
    - from: build/native/pi-deepseek-notification-status-helper
      to: MacOS/pi-deepseek-notification-status-helper

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  artifactName: ${productName}-${version}-win-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  artifactName: ${productName}-${version}-win-${arch}-setup.${ext}

portable:
  artifactName: ${productName}-${version}-win-${arch}-portable.${ext}

linux:
  category: Development
  executableName: pi-deepseek
  target:
    - target: AppImage
      arch:
        - x64

toolsets:
  appimage: "1.0.2"

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

publish:
  provider: github
  owner: jasonet
  repo: pi-deepseek
