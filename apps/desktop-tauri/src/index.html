<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pi-Deepseek</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --blue: #4D6BFE;
      --green: #3fb950;
      --red: #f85149;
      --text: #e6edf3;
      --muted: #8b949e;
    }
    * { margin:0; padding:0; box-sizing:border-box }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      width: 100%;
      max-width: 520px;
      padding: 40px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      align-items: center;
      text-align: center;
    }
    .logo {
      font-size: 64px;
      font-style: italic;
      font-weight: 700;
      background: linear-gradient(135deg, var(--blue), #7c8aff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    h1 { font-size: 24px; font-weight: 600 }
    .sub { color: var(--muted); font-size: 13px; line-height: 1.6 }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 24px;
      width: 100%;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .card-row { display: flex; align-items: center; gap: 12px }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0 }
    .dot-ok { background: var(--green) }
    .dot-no { background: var(--red) }
    .card-label { font-size: 13px; font-weight: 600 }
    .card-value { font-size: 12px; color: var(--muted); font-family: "SF Mono", monospace; word-break: break-all }
    .install-box {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
    }
    .install-box code {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 12px;
      color: #7ee787;
      display: block;
      word-break: break-all;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      transition: all .15s;
    }
    .btn:hover { border-color: var(--blue); background: #1a2035 }
    .btn-primary { background: var(--blue); border-color: var(--blue); color: #fff }
    .btn-primary:hover { background: #3d5df0 }
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center }
    .status-text { font-size: 14px; padding: 8px 0 }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">&#960;</div>
    <div>
      <h1>Pi-Deepseek</h1>
      <p class="sub">Deepseek GUI · Tauri 2 · Rust<br/>v0.2.2</p>
    </div>

    <!-- pi CLI Status -->
    <div class="card">
      <div class="card-row">
        <div class="dot" id="pi-dot"></div>
        <div class="card-label">pi CLI</div>
      </div>
      <div id="pi-status" class="status-text">检测中...</div>
      <div id="pi-path" class="card-value" style="display:none"></div>
      <div id="pi-install" style="display:none">
        <p style="font-size:12px;color:var(--muted);margin-bottom:8px">pi 是会话管理和智能体运行的必要依赖。运行以下命令安装：</p>
        <div class="install-box">
          <code id="install-cmd">curl -fsSL https://pi.dev/install.sh | sh</code>
        </div>
        <div class="btn-group" style="margin-top:12px">
          <button class="btn btn-primary" id="btn-copy">📋 复制命令</button>
          <button class="btn" id="btn-install">⚡ 自动安装</button>
        </div>
      </div>
    </div>

    <!-- Build Info -->
    <div class="card">
      <div class="card-row">
        <div class="dot dot-ok"></div>
        <div class="card-label">构建信息</div>
      </div>
      <div class="card-value" id="build-info">加载中...</div>
    </div>
  </div>

  <script type="module">
    import { invoke } from "@tauri-apps/api/core";
    import { writeText } from "@tauri-apps/plugin-clipboard-manager";

    const INSTALL_CMD = "curl -fsSL https://pi.dev/install.sh | sh";
    document.getElementById("install-cmd").textContent = INSTALL_CMD;

    async function init() {
      // Check pi
      try {
        const version = await invoke("get_pi_version");
        const dot = document.getElementById("pi-dot");
        const status = document.getElementById("pi-status");

        if (version === "not-installed") {
          dot.className = "dot dot-no";
          status.innerHTML = '❌ <b>pi CLI 未安装</b>';
          document.getElementById("pi-install").style.display = "block";
        } else {
          dot.className = "dot dot-ok";
          status.innerHTML = '✅ <b>pi CLI 已安装</b> — ' + version;

          // Try to find the path
          try {
            const result = await invoke("check_pi_path");
            document.getElementById("pi-path").style.display = "block";
            document.getElementById("pi-path").textContent = "路径: " + result;
          } catch(e) {}
        }
      } catch(e) {
        document.getElementById("pi-dot").className = "dot dot-no";
        document.getElementById("pi-status").innerHTML = '⚠️ 检测失败: ' + e;
      }

      // Build variant
      try {
        const variant = await invoke("get_variant");
        document.getElementById("build-info").textContent =
          variant + " · Tauri 2 · Rust · aarch64";
      } catch(e) {
        document.getElementById("build-info").textContent = "Tauri 2 · Rust";
      }
    }

    // Copy button
    document.getElementById("btn-copy").onclick = async () => {
      try {
        await writeText(INSTALL_CMD);
        document.getElementById("btn-copy").textContent = "✅ 已复制!";
        setTimeout(() => {
          document.getElementById("btn-copy").textContent = "📋 复制命令";
        }, 2000);
      } catch(e) {
        // Fallback
        await navigator.clipboard.writeText(INSTALL_CMD);
        document.getElementById("btn-copy").textContent = "✅ 已复制!";
        setTimeout(() => {
          document.getElementById("btn-copy").textContent = "📋 复制命令";
        }, 2000);
      }
    };

    // Auto install button
    document.getElementById("btn-install").onclick = async () => {
      const btn = document.getElementById("btn-install");
      btn.textContent = "⏳ 安装中...";
      btn.disabled = true;
      try {
        const result = await invoke("install_pi");
        btn.textContent = "✅ " + result;
        // Re-check after install
        setTimeout(init, 2000);
      } catch(e) {
        btn.textContent = "❌ 失败";
        btn.disabled = false;
      }
    };

    init();
  </script>
</body>
</html>
