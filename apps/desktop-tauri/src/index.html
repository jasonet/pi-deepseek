<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pi-Deepseek</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      background: linear-gradient(135deg, #4D6BFE 0%, #1a1f36 100%);
      color: #fff; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 20px;
      -webkit-app-region: drag; user-select: none;
    }
    .logo { font-size: 96px; font-style: italic; font-weight: 700; text-shadow: 0 4px 24px rgba(0,0,0,.3) }
    h1 { font-size: 28px; font-weight: 600 }
    p { opacity: .65; font-size: 13px }
    .card { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); border-radius: 12px; padding: 16px 28px; min-width: 260px; text-align: center }
    .label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; opacity: .45 }
    .value { font-size: 15px; font-weight: 500; margin-top: 6px }
  </style>
</head>
<body>
  <div class="logo">&#960;</div>
  <h1>Pi-Deepseek</h1>
  <p>Tauri 2 · v0.2.2 · Rust</p>
  <div class="card"><div class="label">pi CLI</div><div class="value" id="s">checking...</div></div>
  <div class="card"><div class="label">Build</div><div class="value" id="v">loading...</div></div>

  <script type="module">
    import { invoke } from "@tauri-apps/api/core";

    async function init() {
      try {
        const version = await invoke("get_pi_version");
        document.getElementById("s").textContent = version;
      } catch (e) {
        document.getElementById("s").textContent = "no pi: " + e;
      }

      try {
        const variant = await invoke("get_variant");
        document.getElementById("v").textContent = variant;
      } catch (e) {
        document.getElementById("v").textContent = "?";
      }
    }

    init();
  </script>
</body>
</html>
